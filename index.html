<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IGI 2026 ⛳ Birdie Juice Cup</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --green-dark:  #0a2318;
  --green-mid:   #163d28;
  --green-light: #2a6e42;
  --green-bright:#3dba6a;
  --gold:        #e8c44a;
  --gold-dim:    #a88c2e;
  --cream:       #f0ebe0;
  --white:       #ffffff;
  --red:         #d94f3a;
  --blue:        #4a8fd4;
  --orange:      #e8834a;
  --gray:        #7a8e80;
  --gray-light:  rgba(255,255,255,0.06);
  --dark:        #061410;
  --border:      rgba(255,255,255,0.07);
  /* Team colours */
  --t1: #009A44;
  --t2: #4a8fd4;
  --t3: #d94f3a;
  --t4: #39ff14;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--green-dark);color:var(--cream);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 60%,rgba(45,122,74,.18) 0%,transparent 70%),radial-gradient(ellipse 50% 30% at 85% 15%,rgba(232,196,74,.07) 0%,transparent 60%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:500px;margin:0 auto;padding-bottom:90px;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(160deg,var(--dark) 0%,var(--green-mid) 100%);padding:18px 20px 14px;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold);line-height:1}
.header-sub{font-size:10px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gray);transition:background .3s}
.sync-dot.live{background:var(--green-bright);box-shadow:0 0 6px var(--green-bright);animation:pulse 2s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* NAV */
.nav{display:flex;background:var(--dark);border-bottom:1px solid rgba(232,196,74,.15);position:sticky;top:60px;z-index:199}
.nav-btn{flex:1;padding:11px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--gray);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* SECTIONS */
.section{display:none;padding:14px 14px 0}
.section.active{display:block}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);letter-spacing:1.5px;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(232,196,74,.2)}

/* LEADERBOARD */
.team-card{background:var(--gray-light);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.team-card.rank-1{border-color:rgba(232,196,74,.35);background:rgba(232,196,74,.06)}
.team-card.rank-2{border-color:rgba(192,192,192,.2)}
.team-rank{font-family:'Bebas Neue',sans-serif;font-size:34px;width:28px;text-align:center;line-height:1;color:rgba(255,255,255,.12)}
.rank-1 .team-rank{color:var(--gold)}
.rank-2 .team-rank{color:#c0c0c0}
.rank-3 .team-rank{color:#cd7f32}
.team-info{flex:1;min-width:0}
.team-name{font-weight:600;font-size:12px;line-height:1.3;color:var(--white)}
.team-record{font-size:10px;color:var(--gray);margin-top:3px;font-family:'DM Mono',monospace}
.team-points{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--green-bright);line-height:1}
.round-result{background:var(--gray-light);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.rr-team{flex:1;font-size:12px}
.rr-team.winning{color:var(--green-bright);font-weight:600}
.rr-team.losing{color:var(--gray)}
.rr-score{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--white)}
.rr-team.right{text-align:right}

/* DAY TABS */
.day-tabs{display:flex;gap:8px;margin-bottom:14px}
.day-tab{flex:1;padding:10px 6px;text-align:center;background:var(--gray-light);border:1px solid var(--border);border-radius:8px;color:var(--gray);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s}
.day-tab.active{background:var(--green-mid);border-color:var(--green-bright);color:var(--white)}
.day-course{font-size:9px;font-family:'DM Mono',monospace;color:var(--gold);margin-top:2px}

/* MATCH CARD */
.matchup-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);font-weight:600;margin:14px 0 6px}
.match-card{background:var(--gray-light);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.match-card.is-live{border-color:rgba(61,186,106,.3)}
.match-card.is-done{border-color:rgba(232,196,74,.2)}
.match-header{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer}
.match-teams{flex:1;min-width:0}
.match-pair{font-size:12px;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match-pair.winner{color:var(--green-bright);font-weight:600}
.match-pair.loser{color:var(--gray)}
.vs-bar{font-size:9px;color:var(--gray);letter-spacing:1px;padding:2px 0}
.match-status{text-align:right;min-width:72px}
.match-result{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);line-height:1}
.match-pts{font-size:10px;color:var(--gray);font-family:'DM Mono',monospace}
.match-live-tag{font-size:10px;color:var(--green-bright);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.chevron{font-size:9px;color:var(--gray);transition:transform .2s;margin-left:2px}
.chevron.open{transform:rotate(180deg)}

/* SCORING PANEL */
.scoring-panel{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
.scoring-panel.open{display:block}

/* HOLE GRID */
.hole-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin:10px 0 8px}
.hole-cell{aspect-ratio:1;border-radius:5px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;position:relative}
.hole-cell .hnum{font-size:7px;color:rgba(255,255,255,.25);font-family:'DM Mono',monospace}
.hole-cell .hres{font-size:10px;font-weight:700;color:transparent}
.hole-cell.won-a{background:rgba(61,186,106,.2);border-color:rgba(61,186,106,.5)}
.hole-cell.won-a .hres{color:var(--green-bright)}
.hole-cell.won-b{background:rgba(74,143,212,.2);border-color:rgba(74,143,212,.5)}
.hole-cell.won-b .hres{color:var(--blue)}
.hole-cell.halved{background:rgba(232,196,74,.12);border-color:rgba(232,196,74,.35)}
.hole-cell.halved .hres{color:var(--gold)}
.hole-cell.voided{opacity:.25}
.hole-cell .bdot{position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;background:var(--orange)}

/* BONUS ROW */
.bonus-row{display:flex;align-items:center;gap:8px;background:rgba(232,131,74,.06);border:1px solid rgba(232,131,74,.2);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.bonus-side{flex:1}
.bonus-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--orange);font-weight:600;margin-bottom:6px}
.bonus-btn{padding:8px 10px;border-radius:7px;border:1.5px solid var(--orange);background:transparent;color:var(--orange);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;font-family:'DM Sans',sans-serif}
.bonus-btn.on{background:var(--orange);color:var(--dark)}
.bonus-btn:disabled{opacity:.3;cursor:default;border-color:var(--gray);color:var(--gray)}
.bonus-btn.on:disabled{background:var(--gray);border-color:var(--gray);color:var(--dark)}
.bonus-left{font-size:9px;color:var(--gray);font-family:'DM Mono',monospace;margin-top:4px;text-align:center}
.bonus-divider{width:1px;height:44px;background:rgba(232,131,74,.2);flex-shrink:0}

/* RUNNING SCORE */
.running-box{background:rgba(0,0,0,.25);border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.running-side{flex:1}
.running-side.right{text-align:right}
.running-name{font-size:10px;color:var(--gray)}
.running-pts{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:var(--white)}
.running-pts.leading{color:var(--green-bright)}
.running-mid{text-align:center}
.running-status{font-size:10px;color:var(--gray);font-family:'DM Mono',monospace}
.running-thru{font-size:18px;font-family:'Bebas Neue',sans-serif;color:var(--white)}

/* ENTRY */
.hole-entry{background:rgba(0,0,0,.2);border-radius:10px;padding:12px;margin-bottom:8px}
.hole-entry-label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:10px}
.entry-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px}
.entry-btn{padding:13px 6px;border-radius:9px;border:1.5px solid;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4;color:inherit}
.entry-btn:active{transform:scale(.96)}
.btn-a{border-color:var(--green-bright);color:var(--green-bright)}
.btn-a:hover{background:rgba(61,186,106,.15)}
.btn-a.bonus-on{border-color:var(--orange);color:var(--orange);background:rgba(232,131,74,.1)}
.btn-half{border-color:var(--gold-dim);color:var(--gold);padding:13px 10px}
.btn-half:hover{background:rgba(232,196,74,.1)}
.btn-b{border-color:var(--blue);color:var(--blue)}
.btn-b:hover{background:rgba(74,143,212,.15)}
.btn-b.bonus-on{border-color:var(--orange);color:var(--orange);background:rgba(232,131,74,.1)}
.bonus-tag{display:block;font-size:9px;margin-top:2px;opacity:.9}

/* FINAL */
.final-box{background:rgba(61,186,106,.08);border:1px solid rgba(61,186,106,.2);border-radius:10px;padding:16px;text-align:center;margin-bottom:8px}
.final-result{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--green-bright);line-height:1}
.final-detail{font-size:11px;color:var(--gray);margin-top:4px}
.final-pts{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);margin-top:4px}
.final-bonus{font-size:10px;color:var(--orange);margin-top:4px}

.undo-btn{width:100%;padding:9px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--gray);font-size:11px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.undo-btn:hover{border-color:var(--red);color:var(--red)}

/* STATS */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-label{font-size:12px;color:var(--gray)}
.stat-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--white)}
.stat-val.hi{color:var(--green-bright)}
.bar-row{margin-bottom:14px}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.bar-name{font-size:12px;color:var(--white)}
.bar-pts{font-family:'DM Mono',monospace;font-size:12px;color:var(--green-bright)}
.bar-track{background:rgba(255,255,255,.06);border-radius:4px;height:6px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--green-light),var(--green-bright));border-radius:4px;transition:width .6s ease}
.bar-rec{font-size:10px;color:var(--gray);margin-top:3px;font-family:'DM Mono',monospace}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--green-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--gold);letter-spacing:3px}
.loading-sub{font-size:12px;color:var(--gray);letter-spacing:1px;text-transform:uppercase}
.loading-spinner{width:32px;height:32px;border:2px solid rgba(232,196,74,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EDIT MODE */
.edit-btn{width:100%;padding:9px;background:transparent;border:1px solid rgba(232,196,74,.3);border-radius:8px;color:var(--gold);font-size:11px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;font-weight:600;margin-top:6px}
.edit-btn:hover{background:rgba(232,196,74,.08)}
.edit-btn.active{background:rgba(232,196,74,.12);border-color:var(--gold)}
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:400;display:flex;align-items:flex-end;justify-content:center;padding:0}
.edit-modal{background:var(--green-mid);border:1px solid rgba(232,196,74,.3);border-top-left-radius:20px;border-top-right-radius:20px;padding:20px 20px 36px;width:100%;max-width:500px}
.edit-modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.edit-modal-sub{font-size:11px;color:var(--gray);margin-bottom:16px}
.edit-hole-result{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-bottom:12px}
.edit-bonus-row{display:flex;gap:8px;margin-bottom:16px}
.edit-bonus-btn{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--orange);background:transparent;color:var(--orange);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.edit-bonus-btn.on{background:var(--orange);color:var(--dark)}
.edit-bonus-btn:disabled{opacity:.3;cursor:default;border-color:var(--gray);color:var(--gray)}
.edit-bonus-btn.on:disabled{background:var(--gray);border-color:var(--gray)}
.edit-close{width:100%;padding:12px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;color:var(--white);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

/* PIN MODAL */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.pin-modal{background:var(--green-mid);border:1px solid var(--gold);border-radius:16px;padding:28px 24px;width:100%;max-width:300px;text-align:center}
.pin-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.pin-sub{font-size:11px;color:var(--gray);margin-bottom:20px}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--gray);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-key{padding:16px;border-radius:10px;border:1px solid var(--border);background:var(--gray-light);color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:22px;cursor:pointer;transition:all .15s;letter-spacing:1px}
.pin-key:active{transform:scale(.93);background:var(--green-light)}
.pin-key.wide{grid-column:span 2;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:0}
.pin-key.del{color:var(--gray)}
.pin-error{font-size:11px;color:var(--red);margin-top:12px;min-height:16px;font-weight:600}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">⛳ IGI 2026</div>
  <div class="loading-sub">Connecting to live scores...</div>
  <div class="loading-spinner"></div>
</div>

<!-- EDIT MODAL -->
<div class="edit-overlay" id="editOverlay" style="display:none" onclick="closeEditModal(event)">
  <div class="edit-modal" id="editModal">
    <div class="edit-modal-title" id="editTitle">Edit Hole</div>
    <div class="edit-modal-sub" id="editSub"></div>
    <div class="edit-hole-result" id="editResultRow"></div>
    <div class="edit-bonus-row" id="editBonusRow"></div>
    <button class="edit-close" onclick="closeEdit()">Done</button>
  </div>
</div>

<!-- PIN MODAL -->
<div class="pin-overlay" id="pinOverlay" style="display:none">
  <div class="pin-modal">
    <div class="pin-title">🔒 Scorer Access</div>
    <div class="pin-sub">Enter PIN to enter scores</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key" onclick="pinCancel()">✕</button>
    </div>
    <div class="pin-error" id="pinError"></div>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
  <div class="header">
    <div>
      <div class="header-title">⛳ Irresponsible Gentlemen's Invitational</div>
      <div class="header-sub">2-Man Scramble · Match Play · Birdie Juice Cup</div>
    </div>
    <div class="sync-dot" id="syncDot"></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showSection('leaderboard')">Standings</button>
    <button class="nav-btn" onclick="showSection('scoring')">Scoring</button>
    <button class="nav-btn" onclick="showSection('stats')">Stats</button>
  </div>
  <div id="leaderboard" class="section active"></div>
  <div id="scoring"     class="section"></div>
  <div id="stats"       class="section"></div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA

document.addEventListener('firebase-ready',()=>{
  const dot=document.getElementById('syncDot');
  window._fbListen('tournament',(data)=>{
    if(data){
      ALL_MATCHES.forEach(m=>{
        if(data.holes&&data.holes[m.id]){
          const s=data.holes[m.id];
          const arr=Array(18).fill(null);
          if(Array.isArray(s)) s.forEach((v,i)=>arr[i]=v);
          else Object.keys(s).forEach(k=>arr[parseInt(k)]=s[k]);
          holes[m.id]=arr;
        }
        if(data.bonus&&data.bonus[m.id]){
          const b=data.bonus[m.id];
          bonusHoles[m.id]={
            a:Array.isArray(b.a)?b.a:Object.values(b.a||{}),
            b:Array.isArray(b.b)?b.b:Object.values(b.b||{})
          };
        }
        if(data.mulligans&&data.mulligans[m.id]){
          mulligans[m.id]={
            a:data.mulligans[m.id].a||0,
            b:data.mulligans[m.id].b||0
          };
        }
        // pending is intentionally NOT synced via Firebase - stored in sessionStorage instead
        loadAllPending();
      });
    }
    dot.className='sync-dot live';
    hideLoading(); render();
  });
});

// MATCH LOGIC
// ═══════════════════════════════════════════
function calcMatch(id){
  const h=holes[id], ba=bonusHoles[id].a, bb=bonusHoles[id].b;
  let aUp=0, played=0, result=null;
  for(let i=0;i<18;i++){
    if(h[i]===null) break;
    played++;
    const av=ba.includes(i)?2:1, bv=bb.includes(i)?2:1;
    if(h[i]==='A') aUp+=av;
    else if(h[i]==='B') aUp-=bv;
    // halved = 0, no points
    const rem=18-played;
    const maxRemA=rem*2, maxRemB=rem*2;
    if(aUp>maxRemB){ result={winner:'A',margin:aUp, close:played,rem}; break; }
    if(-aUp>maxRemA){ result={winner:'B',margin:-aUp,close:played,rem}; break; }
  }
  if(!result&&played===18){
    if(aUp>0)      result={winner:'A',margin:aUp, close:18,rem:0};
    else if(aUp<0) result={winner:'B',margin:-aUp,close:18,rem:0};
    else           result={winner:'H',margin:0,   close:18,rem:0};
  }
  return {aUp,played,result};
}

function fmtResult(result,pairA,pairB){
  if(!result) return null;
  const winner=result.winner==='A'?pairA:result.winner==='B'?pairB:null;
  if(result.winner==='H') return {text:'Halved',pts:0,winner:null,detail:'Match all square after 18'};
  const txt=result.rem>0?`${result.margin}&${result.rem}`:`${result.margin} Up`;
  return {text:txt,pts:result.margin,winner,detail:`${winner} wins ${txt}`};
}

function bonusUsed(id,side){ return bonusHoles[id][side].length; }

function getTeamStats(){
  const pts={1:0,2:0,3:0,4:0},wins={1:0,2:0,3:0,4:0},loss={1:0,2:0,3:0,4:0},half={1:0,2:0,3:0,4:0};
  SCHEDULE.forEach(day=>day.matches.forEach(m=>{
    const {aUp,played,result}=calcMatch(m.id);
    if(result){
      if(result.winner==='A'){pts[m.teamA]+=result.margin;wins[m.teamA]++;loss[m.teamB]++;}
      else if(result.winner==='B'){pts[m.teamB]+=result.margin;wins[m.teamB]++;loss[m.teamA]++;}
      else{half[m.teamA]++;half[m.teamB]++;}
    } else if(played>0){
      // In-progress — add live running score to points
      if(aUp>0) pts[m.teamA]+=aUp;
      else if(aUp<0) pts[m.teamB]+=(-aUp);
    }
  }));
  return {pts,wins,loss,half};
}

function buildMatchCard(m){
  const {aUp,played,result}=calcMatch(m.id);
  const fmt=result?fmtResult(result,m.pairA,m.pairB):null;
  const isOpen=openPanels[m.id];
  const cardCls=result?'is-done':played>0?'is-live':'';
  const tA=TEAMS.find(t=>t.id===m.teamA), tB=TEAMS.find(t=>t.id===m.teamB);
  const cA=tA.color, cB=tB.color;

  let statusHtml='';
  if(fmt){
    const winCol=fmt.winner===m.pairA?cA:fmt.winner===m.pairB?cB:'var(--gold)';
    statusHtml=`<div class="match-result" style="color:${winCol}">${fmt.text}</div><div class="match-pts">${fmt.pts>0?fmt.pts+' pts':'Halved'}</div>`;
  } else if(played>0){
    const leadCol=aUp===0?'var(--gray)':aUp>0?cA:cB;
    const lbl=aUp===0?'A/S':aUp>0?`${m.pairA.split('&')[0].trim()} +${aUp}`:`${m.pairB.split('&')[0].trim()} +${-aUp}`;
    statusHtml=`<div class="match-live-tag" style="color:${leadCol}">${lbl}</div><div class="match-pts">Thru ${played}</div>`;
  } else {
    statusHtml=`<div class="match-pts" style="color:var(--gray)">Tap to score</div>`;
  }

  const pACol=fmt?(fmt.winner===m.pairA?cA:'var(--gray)'):`color:${cA}`;
  const pBCol=fmt?(fmt.winner===m.pairB?cB:'var(--gray)'):`color:${cB}`;

  return `<div class="match-card ${cardCls}" style="border-left:3px solid ${cA}20;">
    <div class="match-header" onclick="togglePanel('${m.id}')">
      <div class="match-teams">
        <div class="match-pair" style="color:${fmt?(fmt.winner===m.pairA?cA:'var(--gray)'):cA}">${m.pairA}</div>
        <div class="vs-bar">vs</div>
        <div class="match-pair" style="color:${fmt?(fmt.winner===m.pairB?cB:'var(--gray)'):cB}">${m.pairB}</div>
      </div>
      <div class="match-status">${statusHtml}</div>
      <div class="chevron ${isOpen?'open':''}">▼</div>
    </div>
    <div class="scoring-panel ${isOpen?'open':''}" id="panel-${m.id}">
      ${buildPanel(m,aUp,played,result,fmt,cA,cB)}
    </div>
  </div>`;
}

function buildPanel(m,aUp,played,result,fmt,cA,cB){
  // Get team colours if not passed (e.g. from edit modal refresh)
  if(!cA){ cA=TEAMS.find(t=>t.id===m.teamA).color; }
  if(!cB){ cB=TEAMS.find(t=>t.id===m.teamB).color; }

  const h=holes[m.id], ba=bonusHoles[m.id].a, bb=bonusHoles[m.id].b, pb=pending[m.id];
  const next=result?-1:h.findIndex(x=>x===null);

  // Hole grid — tappable in edit mode (played holes + next unplayed hole)
  const inEdit=editMode[m.id];
  let grid='<div class="hole-grid">';
  for(let i=0;i<18;i++){
    const v=h[i], voided=result&&i>=result.close&&!inEdit;
    const aB=ba.includes(i), bB=bb.includes(i);
    const dot=(aB||bB)&&!voided?'<span class="bdot"></span>':'';
    const lbl=v==='A'?m.pairA.split('&')[0].trim().substring(0,3):v==='B'?m.pairB.split('&')[0].trim().substring(0,3):v==='H'?'½':'';
    const isNextHole=inEdit&&v===null&&i===next;
    const clickable=inEdit&&(v!==null||isNextHole);
    const editOutline=clickable?(isNextHole?`outline:2px dashed ${cA}99`:`outline:2px solid rgba(232,196,74,.4)`):'';
    // Team-coloured cell backgrounds
    let cellBg='', cellBorder='rgba(255,255,255,.08)', cellColor='transparent';

      if(v==='A'){ cellBg=`${cA}33`; cellBorder=`${cA}88`; cellColor=cA; }
      else if(v==='B'){ cellBg=`${cB}33`; cellBorder=`${cB}88`; cellColor=cB; }

    }
    grid+=`<div class="hole-cell" style="background:${cellBg};border-color:${cellBorder};${voided?'opacity:.25':''}${clickable?`;cursor:pointer;${editOutline}`:''};" ${clickable?`onclick="openEditHole('${m.id}',${i})"`:''}>
      <span class="hnum">${i+1}</span><span class="hres" style="color:${cellColor}">${lbl}</span>${dot}
    </div>`;
  }
  grid+='</div>';

  // Bonus declaration row
  let bonusHtml='';
  if(!result&&next>=0){
    const aUsed=bonusUsed(m.id,'a'), bUsed=bonusUsed(m.id,'b');
    const aDis=(MAX_BONUS-aUsed-(pb.a?1:0)<=0&&!pb.a)?'disabled':'';
    const bDis=(MAX_BONUS-bUsed-(pb.b?1:0)<=0&&!pb.b)?'disabled':'';

        <div class="bonus-left">${MAX_BONUS-aUsed-(pb.a?1:0)} remaining</div>
      </div>
      <div class="bonus-divider"></div>
      <div class="bonus-side" style="text-align:right">
        <div class="bonus-label" style="text-align:right;color:${cB}">🔥 ${m.pairB}</div>
        <button class="bonus-btn ${pb.b?'on':''}" style="border-color:${cB};color:${pb.b?'var(--dark)':cB};${pb.b?`background:${cB}`:''};" ${bDis} onclick="toggleBonus('${m.id}','b')">${pb.b?'✓ Bonus On':'+ Bonus'}</button>
        <div class="bonus-left">${MAX_BONUS-bUsed-(pb.b?1:0)} remaining</div>
      </div>
    </div>`;
  }

  // Mulligan tracker
  const mu=mulligans[m.id];
  const MAX_MU=2;
  const amuLeft=MAX_MU-mu.a, bmuLeft=MAX_MU-mu.b;
  let mulliganHtml=`<div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;">
    <div style="flex:1;">
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:${cA};font-weight:600;margin-bottom:6px;">🔄 ${m.pairA}</div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button onclick="useMulligan('${m.id}','a')" ${mu.a>=MAX_MU?'disabled':''} style="padding:6px 10px;border-radius:6px;border:1.5px solid ${cA};background:transparent;color:${cA};font-size:11px;font-weight:600;cursor:pointer;${mu.a>=MAX_MU?'opacity:.3;cursor:default;':''}font-family:'DM Sans',sans-serif;">Use</button>
        <button onclick="undoMulligan('${m.id}','a')" ${mu.a<=0?'disabled':''} style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--gray);font-size:11px;cursor:pointer;${mu.a<=0?'opacity:.3;cursor:default;':''}font-family:'DM Sans',sans-serif;">↩</button>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:${amuLeft>0?cA:'var(--gray)'};">${amuLeft} left</span>
      </div>
    </div>
    <div style="width:1px;height:40px;background:var(--border);flex-shrink:0;"></div>
    <div style="flex:1;text-align:right;">
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:${cB};font-weight:600;margin-bottom:6px;">🔄 ${m.pairB}</div>
      <div style="display:flex;gap:6px;align-items:center;justify-content:flex-end;">
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:${bmuLeft>0?cB:'var(--gray)'};">${bmuLeft} left</span>

      </div>
    </div>
  </div>`;
  let runHtml='';
  if(!result&&played>0){
    const aName=m.pairA.split('&')[0].trim(), bName=m.pairB.split('&')[0].trim();
    runHtml=`<div class="running-box">

      <div class="running-side right">
        <div class="running-name" style="color:${cB}">${bName}</div>
        <div class="running-pts" style="color:${aUp<0?cB:'var(--white)'}">${Math.max(0,-aUp)}</div>
      </div>
    </div>`;
  }

  // Entry buttons or final result
  let actionHtml='';
  if(!result&&next>=0){
    const aBon=pb.a, bBon=pb.b;
    actionHtml=`<div class="hole-entry">
      <div class="hole-entry-label">Hole ${next+1} Winner</div>
      <div class="entry-row">
        <button class="entry-btn ${aBon?'bonus-on':''}" style="border-color:${aBon?'var(--orange)':cA};color:${aBon?'var(--orange)':cA};${aBon?'background:rgba(232,131,74,.1)':''}" onclick="enterHole('${m.id}',${next},'A')">
          ${m.pairA}${aBon?'<span class="bonus-tag">🔥 +2 pts</span>':''}
        </button>
        <button class="entry-btn btn-half" onclick="enterHole('${m.id}',${next},'H')">½<br>Halved</button>
        <button class="entry-btn ${bBon?'bonus-on':''}" style="border-color:${bBon?'var(--orange)':cB};color:${bBon?'var(--orange)':cB};${bBon?'background:rgba(232,131,74,.1)':''}" onclick="enterHole('${m.id}',${next},'B')">
          ${m.pairB}${bBon?'<span class="bonus-tag">🔥 +2 pts</span>':''}
        </button>
      </div>
    </div>`;
  } else if(result&&fmt){
    const winTeam=result.winner==='A'?TEAMS.find(t=>t.id===m.teamA):result.winner==='B'?TEAMS.find(t=>t.id===m.teamB):null;
    const col=result.winner==='H'?'var(--gold)':winTeam.color;
    const totalBonuses=ba.length+bb.length;
    const bonusNote=totalBonuses>0?`<div class="final-bonus">🔥 ${ba.length} by ${m.pairA.split('&')[0].trim()}, ${bb.length} by ${m.pairB.split('&')[0].trim()}</div>`:'';
    actionHtml=`<div class="final-box" style="border-color:${col}33;background:${col}10;">
      <div class="final-result" style="color:${col}">${fmt.text}</div>
      <div class="final-detail">${fmt.detail}</div>
      ${fmt.pts>0?`<div class="final-pts">${fmt.pts} pts → <span style="color:${col}">${winTeam.short}</span></div>`:''}
      ${bonusNote}
    </div>`;
  }

  const inEditMode=editMode[m.id];
  const editBtnHtml=`<button class="edit-btn ${inEditMode?'active':''}" onclick="toggleEditMode('${m.id}')">${inEditMode?'✓ Done Editing':'✏️ Edit a Hole'}</button>`;
  return grid+bonusHtml+mulliganHtml+runHtml+actionHtml+editBtnHtml;
}

// ═══════════════════════════════════════════
// RENDER — STATS
// ═══════════════════════════════════════════
function renderStats(){
  const {pts,wins,loss,half}=getTeamStats();
  const maxPts=Math.max(1,...Object.values(pts));
  let totalPlayed=0,totalHoles=0,totalBonuses=0;
  let bigWin=null,bigWinPts=0,closeMatch=null,closeMatchPts=99;
  SCHEDULE.forEach(day=>day.matches.forEach(m=>{
    const {played,result}=calcMatch(m.id);
    totalHoles+=played;
    totalBonuses+=bonusHoles[m.id].a.length+bonusHoles[m.id].b.length;
    if(!result) return;
    totalPlayed++;
    if(result.winner!=='H'){
      if(result.margin>bigWinPts){bigWinPts=result.margin;bigWin={m,result};}
      if(result.margin<closeMatchPts){closeMatchPts=result.margin;closeMatch={m,result};}
    }
  }));
  let html='<div style="padding-top:4px;">';
  html+='<div class="sec-title">Tournament Progress</div>';
  html+=`<div class="stat-row"><span class="stat-label">Matches Complete</span><span class="stat-val">${totalPlayed} / 12</span></div>`;
  html+=`<div class="stat-row"><span class="stat-label">Holes Played</span><span class="stat-val">${totalHoles}</span></div>`;
  html+=`<div class="stat-row"><span class="stat-label">Total Points Banked</span><span class="stat-val hi">${Object.values(pts).reduce((a,b)=>a+b,0)}</span></div>`;
  html+=`<div class="stat-row"><span class="stat-label">🔥 Bonuses Used</span><span class="stat-val" style="color:var(--orange)">${totalBonuses} / ${ALL_MATCHES.length*MAX_BONUS*2}</span></div>`;
  html+='<div class="sec-title">Highlights</div>';
  if(bigWin){const f=fmtResult(bigWin.result,bigWin.m.pairA,bigWin.m.pairB);html+=`<div class="stat-row"><span class="stat-label">Biggest Win</span><span class="stat-val hi">${f.text} — ${f.winner}</span></div>`;}
  else html+=`<div class="stat-row"><span class="stat-label">Biggest Win</span><span class="stat-val">—</span></div>`;
  if(closeMatch&&closeMatchPts<99){const f=fmtResult(closeMatch.result,closeMatch.m.pairA,closeMatch.m.pairB);html+=`<div class="stat-row"><span class="stat-label">Closest Match</span><span class="stat-val">${f.text} — ${f.winner}</span></div>`;}
  else html+=`<div class="stat-row"><span class="stat-label">Closest Match</span><span class="stat-val">—</span></div>`;
  html+='<div class="sec-title">Points Breakdown</div>';
  [...TEAMS].sort((a,b)=>pts[b.id]-pts[a.id]).forEach(t=>{
    const pct=(pts[t.id]/maxPts)*100;
    html+=`<div class="bar-row">
      <div class="bar-top">
        <span class="bar-name" style="color:${t.color};display:flex;align-items:center;gap:6px;"><img src="${t.logo}" style="width:24px;height:24px;object-fit:contain;"/>${t.short}</span>
        <span class="bar-pts" style="color:${t.color}">${pts[t.id]} pts</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${t.color};"></div></div>
      <div class="bar-rec">${wins[t.id]}W · ${loss[t.id]}L · ${half[t.id]}H</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('stats').innerHTML=html;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function savePending(id){
  try{ sessionStorage.setItem('pb_'+id, JSON.stringify(pending[id])); }catch(e){}
}
function loadAllPending(){
  ALL_MATCHES.forEach(m=>{
    try{ const s=sessionStorage.getItem('pb_'+m.id); if(s) pending[m.id]=JSON.parse(s); }catch(e){}
  });
}

function toggleBonus(id,side){
  const pb=pending[id];
  if(!pb[side]&&bonusUsed(id,side)>=MAX_BONUS) return;
  pb[side]=!pb[side];
  savePending(id);
  render();
}

function enterHole(id,idx,result){
  holes[id][idx]=result;
  const pb=pending[id];
  if(result!=='H'){
    if(pb.a){ bonusHoles[id].a.push(idx); }
    if(pb.b){ bonusHoles[id].b.push(idx); }
  }
  // Always clear pending after hole entered regardless of result
  pb.a=false; pb.b=false;
  savePending(id);
  saveMatch(id); render();
}


// ═══════════════════════════════════════════
// PIN SYSTEM
// ═══════════════════════════════════════════
const SCORER_PIN = '6969';
let pinUnlocked  = false;   // stays unlocked for the session once entered
let pinBuffer    = '';
let pinTarget    = null;    // match id waiting to be unlocked

function useMulligan(id,side){
  if(mulligans[id][side]>=2) return;
  mulligans[id][side]++;
  saveMatch(id); render();
}

function undoMulligan(id,side){
  if(mulligans[id][side]<=0) return;
  mulligans[id][side]--;
  saveMatch(id); render();
}

function toggleEditMode(id){
  editMode[id]=!editMode[id];
  render();
}

function openEditHole(matchId, holeIdx){
  const m=ALL_MATCHES.find(x=>x.id===matchId);
  const h=holes[matchId][holeIdx];
  const aBonus=bonusHoles[matchId].a.includes(holeIdx);
  const bBonus=bonusHoles[matchId].b.includes(holeIdx);
  const aUsed=bonusUsed(matchId,'a');
  const bUsed=bonusUsed(matchId,'b');
  const aCanBonus=aBonus||(aUsed<MAX_BONUS);
  const bCanBonus=bBonus||(bUsed<MAX_BONUS);
  const isNew=h===null;
  const cA=TEAMS.find(t=>t.id===m.teamA).color;
  const cB=TEAMS.find(t=>t.id===m.teamB).color;

  document.getElementById('editTitle').textContent=isNew?`Enter Hole ${holeIdx+1}`:`Edit Hole ${holeIdx+1}`;
  document.getElementById('editSub').textContent=`${m.pairA}  vs  ${m.pairB}`;

  document.getElementById('editResultRow').innerHTML=`
    <button class="entry-btn" style="border-color:${h==='A'?'var(--gold)':cA};color:${h==='A'?'var(--gold)':cA};${h==='A'?'background:rgba(232,196,74,.1)':''}" onclick="editSetResult('${matchId}',${holeIdx},'A')">${m.pairA}</button>
    <button class="entry-btn btn-half ${h==='H'?'bonus-on':''}" onclick="editSetResult('${matchId}',${holeIdx},'H')" style="padding:13px 10px">½<br>Halved</button>
    <button class="entry-btn" style="border-color:${h==='B'?'var(--gold)':cB};color:${h==='B'?'var(--gold)':cB};${h==='B'?'background:rgba(232,196,74,.1)':''}" onclick="editSetResult('${matchId}',${holeIdx},'B')">${m.pairB}</button>
  `;

  const bonusVisible=h!=='H';
  document.getElementById('editBonusRow').innerHTML=bonusVisible?`
    <button class="edit-bonus-btn ${aBonus?'on':''}" style="border-color:${cA};color:${aBonus?'var(--dark)':cA};${aBonus?`background:${cA}`:''};" ${!aCanBonus?'disabled':''} onclick="editToggleBonus('${matchId}',${holeIdx},'a')">
      🔥 ${m.pairA.split('&')[0].trim()} ${aBonus?'✓':''}
    </button>
    <button class="edit-bonus-btn ${bBonus?'on':''}" style="border-color:${cB};color:${bBonus?'var(--dark)':cB};${bBonus?`background:${cB}`:''};" ${!bCanBonus?'disabled':''} onclick="editToggleBonus('${matchId}',${holeIdx},'b')">
      🔥 ${m.pairB.split('&')[0].trim()} ${bBonus?'✓':''}
    </button>
  `:'<div style="font-size:10px;color:var(--gray);text-align:center;padding:4px 0;">No bonus on halved holes</div>';

  document.getElementById('editOverlay').dataset.matchId=matchId;
  document.getElementById('editOverlay').dataset.holeIdx=holeIdx;
  document.getElementById('editOverlay').style.display='flex';
}

function editSetResult(matchId, holeIdx, result){
  holes[matchId][holeIdx]=result;
  // If changed to halved, remove bonuses for this hole
  if(result==='H'){
    bonusHoles[matchId].a=bonusHoles[matchId].a.filter(x=>x!==holeIdx);
    bonusHoles[matchId].b=bonusHoles[matchId].b.filter(x=>x!==holeIdx);
  }
  saveMatch(matchId);
  // Refresh the modal buttons to show new selection
  openEditHole(matchId, holeIdx);
  render();
}

function editToggleBonus(matchId, holeIdx, side){
  const arr=bonusHoles[matchId][side];
  const hasBonus=arr.includes(holeIdx);
  const used=bonusUsed(matchId,side);
  if(!hasBonus && used>=MAX_BONUS) return; // no bonus left
  if(hasBonus){
    bonusHoles[matchId][side]=arr.filter(x=>x!==holeIdx);
  } else {
    bonusHoles[matchId][side].push(holeIdx);
  }
  saveMatch(matchId);
  openEditHole(matchId, holeIdx);
  render();
}

function closeEditModal(e){
  if(e.target===document.getElementById('editOverlay')) closeEdit();
}

function closeEdit(){
  document.getElementById('editOverlay').style.display='none';
}

function togglePanel(id){
  // If opening and not yet unlocked, show PIN modal
  if(!openPanels[id] && !pinUnlocked){
    pinTarget = id;
    pinBuffer = '';
    updatePinDots();
    document.getElementById('pinError').textContent = '';
    document.getElementById('pinOverlay').style.display = 'flex';
    return;
  }
  openPanels[id]=!openPanels[id]; render();
}

function pinKey(digit){
  if(pinBuffer.length>=4) return;
  pinBuffer+=digit;
  updatePinDots();
  if(pinBuffer.length===4) setTimeout(checkPin,120);
}

function pinDel(){
  pinBuffer=pinBuffer.slice(0,-1);
  updatePinDots();
  document.getElementById('pinError').textContent='';
}

function pinCancel(){
  pinTarget=null; pinBuffer='';
  document.getElementById('pinOverlay').style.display='none';
}

function checkPin(){
  if(pinBuffer===SCORER_PIN){
    pinUnlocked=true;
    document.getElementById('pinOverlay').style.display='none';
    if(pinTarget){ openPanels[pinTarget]=true; pinTarget=null; }
    render();
  } else {
    // Flash error
    document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));
    document.getElementById('pinError').textContent='Wrong PIN — try again';
    setTimeout(()=>{
      document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error'));
      pinBuffer='';
      updatePinDots();
    },700);
  }
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    document.getElementById('pd'+i).classList.toggle('filled', i<pinBuffer.length);
  }
}

function setDay(d){ activeDay=d; render(); }
function showSection(name){
  activeSection=name;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  document.querySelectorAll('.nav-btn')[['leaderboard','scoring','stats'].indexOf(name)].classList.add('active');
  render();
}
function render(){ renderLeaderboard(); renderScoring(); renderStats(); }
</script>
